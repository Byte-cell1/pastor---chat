l<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pastor Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Roboto,sans-serif}
body{background:#0b141a;color:#e9edef;height:100vh;display:flex}
.sidebar{width:320px;background:#111b21;border-right:1px solid #222f35;display:flex;flex-direction:column}
.sidebar h2{padding:15px;background:#202c33;font-size:16px;font-weight:600}
.add-user{padding:10px;background:#202c33;border-bottom:1px solid #222f35}
.add-user input{width:100%;padding:10px;border-radius:8px;border:none;background:#2a3942;color:#e9edef;outline:none}
.user-list{flex:1;overflow-y:auto}
.user-item{padding:12px 15px;cursor:pointer;border-bottom:1px solid #222f35;display:flex;justify-content:space-between;align-items:center}
.user-item:hover{background:#202c33}
.user-item.active{background:#2a3942}
.user-name{font-size:14px}
.remove-btn{background:#ff3b3b;border:none;color:#fff;padding:4px 8px;border-radius:4px;font-size:12px;cursor:pointer}
.chat-area{flex:1;display:flex;flex-direction:column}
.chat-header{padding:15px;background:#202c33;border-bottom:1px solid #222f35;display:flex;justify-content:space-between;align-items:center}
.chat-header .status{font-size:12px;color:#00a884}
.chat-body{flex:1;overflow-y:auto;padding:20px;background:#0b141a}
.msg{margin:8px 0;display:flex}
.msg.user{justify-content:flex-start}
.msg.pastor{justify-content:flex-end}
.bubble{max-width:65%;padding:8px 12px;border-radius:7.5px;font-size:14.5px;line-height:1.4}
.user .bubble{background:#202c33;border-top-left-radius:0}
.pastor .bubble{background:#005c4b;border-top-right-radius:0}
.time{font-size:11px;color:#667781;margin-top:3px;text-align:right}
.chat-input{padding:10px 15px;background:#202c33;display:flex;gap:10px}
.chat-input input{flex:1;padding:12px 15px;border-radius:8px;border:none;background:#2a3942;color:#e9edef;outline:none}
.chat-input button{background:#00a884;border:none;color:#fff;width:45px;height:45px;border-radius:50%;cursor:pointer;font-size:18px}
.chat-input button:disabled{opacity:0.5;cursor:not-allowed}
.no-chat{flex:1;display:flex;align-items:center;justify-content:center;color:#8696a0}
@media(max-width:768px){
 .sidebar{position:absolute;z-index:10;width:100%;height:100%;transform:translateX(-100%);transition:0.3s}
 .sidebar.show{transform:translateX(0)}
}
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
  <h2>Users</h2>
  <div class="add-user">
    <input id="newUserName" placeholder="Enter user name + Enter">
  </div>
  <div class="user-list" id="userList"></div>
</div>

<div class="chat-area">
  <div class="chat-header">
    <div>
      <div id="chatTitle">Select a user</div>
      <div class="status" id="status">Pastor Online</div>
    </div>
    <button id="menuBtn" style="display:none;background:none;border:none;color:#e9edef;font-size:20px;cursor:pointer" onclick="toggleMenu()">⋮</button>
  </div>
  <div id="chatBody" class="chat-body">
    <div class="no-chat">Click a user to start chatting</div>
  </div>
  <div class="chat-input">
    <input id="msgInput" placeholder="Type a message..." disabled>
    <button id="sendBtn" onclick="sendMessage()" disabled>➤</button>
  </div>
</div>

<script>
const firebaseConfig = YOUR_FIREBASE_CONFIG;
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentRoom = null;
let currentUserName = null;

// Mark pastor online/offline
const pastorRef = db.ref('status/pastor');
pastorRef.set(true);
window.addEventListener('beforeunload', () => pastorRef.set(false));
pastorRef.onDisconnect().set(false);

// Add user
document.getElementById('newUserName').addEventListener('keypress', e => {
  if(e.key === 'Enter'){
    const name = e.target.value.trim();
    if(!name) return;
    const userId = 'user_' + Date.now();
    db.ref('users/' + userId).set({name: name, created: Date.now()});
    db.ref('chats/' + userId).set({name: name});
    e.target.value = '';
    alert('User created! Send them this link:\nuser.html?uid=' + userId);
  }
});

// Load users
db.ref('users').on('value', snap => {
  const list = document.getElementById('userList');
  list.innerHTML = '';
  snap.forEach(child => {
    const id = child.key;
    const data = child.val();
    const div = document.createElement('div');
    div.className = 'user-item' + (id === currentRoom ? ' active' : '');
    div.innerHTML = `<span class="user-name">${data.name}</span><button class="remove-btn" onclick="removeUser('${id}', event)">Remove</button>`;
    div.onclick = (e) => {
      if(!e.target.classList.contains('remove-btn')) openChat(id, data.name);
    };
    list.appendChild(div);
  });
});

function openChat(userId, name){
  currentRoom = userId;
  currentUserName = name;
  document.getElementById('chatTitle').textContent = name;
  document.getElementById('menuBtn').style.display = 'block';
  document.getElementById('msgInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  
  document.querySelectorAll('.user-item').forEach(u => u.classList.remove('active'));
  event.currentTarget.classList.add('active');

  loadMessages(userId);
}

function loadMessages(userId){
  const chatBody = document.getElementById('chatBody');
  chatBody.innerHTML = '';
  db.ref('chats/' + userId + '/messages').off();
  db.ref('chats/' + userId + '/messages').on('child_added', snap => {
    const m = snap.val();
    const div = document.createElement('div');
    div.className = 'msg ' + m.sender;
    div.innerHTML = `<div class="bubble">${m.text}<div class="time">${formatTime(m.time)}</div></div>`;
    chatBody.appendChild(div);
    chatBody.scrollTop = chatBody.scrollHeight;
  });
}

function sendMessage(){
  const text = document.getElementById('msgInput').value.trim();
  if(!text || !currentRoom) return;
  db.ref('chats/' + currentRoom + '/messages').push({
    text: text,
    sender: 'pastor',
    time: Date.now()
  });
  document.getElementById('msgInput').value = '';
}

function removeUser(userId, e){
  e.stopPropagation();
  if(confirm('Remove this user? All chat will be deleted.')){
    db.ref('users/' + userId).remove();
    db.ref('chats/' + userId).remove();
    if(currentRoom === userId){
      currentRoom = null;
      document.getElementById('chatBody').innerHTML = '<div class="no-chat">User removed</div>';
      document.getElementById('chatTitle').textContent = 'Select a user';
      document.getElementById('msgInput').disabled = true;
      document.getElementById('sendBtn').disabled = true;
    }
  }
}

function formatTime(ts){
  const d = new Date(ts);
  return d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
}

document.getElementById('msgInput').addEventListener('keypress', e => {
  if(e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
