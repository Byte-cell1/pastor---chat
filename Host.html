<!DOCTYPE html>
<html>
<head>
<title>Pastor Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#0b141a;color:#fff;display:flex;height:100vh}
#users{width:280px;background:#111b21;border-right:1px solid #2a3b44;overflow-y:auto}
.topbar{padding:12px;background:#1f2c33;border-bottom:1px solid #2a3b44;display:flex;justify-content:space-between;align-items:center}
.addbtn{background:#005c4b;border:none;color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:14px}
.user{padding:12px;cursor:pointer;border-bottom:1px solid #1f2c33}
.user:hover{background:#202c33}
.user.active{background:#005c4b}
#chat{flex:1;display:flex;flex-direction:column}
.top{padding:12px;background:#1f2c33;border-bottom:1px solid #2a3b44}
#messages{flex:1;overflow-y:auto;padding:10px}
.msg{margin:8px 0;padding:8px 12px;border-radius:8px;max-width:70%}
.me{background:#005c4b;margin-left:auto;text-align:right}
.them{background:#202c33}
.msg img{max-width:200px;border-radius:8px}
.msg audio{max-width:220px}
.bottom{display:flex;padding:5px;background:#1f2c33;gap:4px}
#msgInput{flex:1;padding:10px;border:none;border-radius:20px;background:#2a3b44;color:#fff;outline:none}
.bottom button{border:none;border-radius:50%;width:45px;height:45px;font-size:20px;cursor:pointer;background:#2a3b44;color:#fff}

/* Popup for link */
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:100}
.popupbox{background:#1f2c33;padding:20px;border-radius:12px;max-width:90%;width:400px}
.popupbox input{width:100%;padding:10px;margin:10px 0;border:none;border-radius:8px;background:#2a3b44;color:#fff}
.popupbox button{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;margin-right:8px}
.copybtn{background:#005c4b;color:#fff}
.closebtn{background:#2a3b44;color:#fff}
</style>
</head>
<body>

<div id="users">
  <div class="topbar">
    <b>Members</b>
    <button class="addbtn" onclick="addMember()">+ Add</button>
  </div>
  <div id="usersList"><div style="padding:12px">Loading...</div></div>
</div>

<div id="chat">
  <div class="top"><b>Select a user</b></div>
  <div id="messages">Click a user on left</div>
  <div class="bottom" style="display:none">
    <button onclick="sendImage()">📷</button>
    <button onclick="sendVoice()">🎤</button>
    <input id="msgInput" placeholder="Type reply..." onkeypress="if(event.key==='Enter')sendText()">
    <button onclick="sendText()">➤</button>
  </div>
</div>

<input type="file" id="imgInput" accept="image/*" style="display:none">
<input type="file" id="audioInput" accept="audio/*" style="display:none">

<!-- Popup to show link -->
<div class="popup" id="linkPopup">
  <div class="popupbox">
    <h3>Member Link Generated</h3>
    <p>Send this link to the member:</p>
    <input id="memberLink" readonly>
    <div>
      <button class="copybtn" onclick="copyLink()">Copy Link</button>
      <button class="closebtn" onclick="closePopup()">Close</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDXeh9GNe3E8L6tE9xMA8fE2OJXCSuhLMY",
  authDomain: "church-project-bfb2d.firebaseapp.com",
  databaseURL: "https://church-project-bfb2d-default-rtdb.firebaseio.com",
  projectId: "church-project-bfb2d",
  storageBucket: "church-project-bfb2d.firebasestorage.app",
  messagingSenderId: "433486920211",
  appId: "1:433486920211:web:8cb750d19c05ce0d1d9de6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUid = null;

// Load user list
onValue(ref(db, 'chats'), snap => {
  const usersDiv = document.getElementById('usersList');
  usersDiv.innerHTML = '';
  if(!snap.exists()) {
    usersDiv.innerHTML = '<div style="padding:12px;color:#8696a0">No members yet. Click + Add</div>';
    return;
  }
  snap.forEach(child => {
    const uid = child.key;
    const div = document.createElement('div');
    div.className = 'user';
    div.textContent = uid;
    div.onclick = () => loadChat(uid, div);
    usersDiv.appendChild(div);
  });
});

// Add new member
window.addMember = function() {
  const name = prompt('Enter member name/ID:');
  if(!name) return;
  const uid = name + '_' + Date.now();
  const link = 'https://byte-cell.github.io/pastor---chat/Members.html?uid=' + uid;

  // Create welcome message so user appears in list
  set(ref(db, 'chats/' + uid + '/welcome'), {
    text: 'Welcome! You can now chat with Pastor.',
    sender: 'host',
    type: 'text',
    time: Date.now()
  });

  // Show popup with link
  document.getElementById('memberLink').value = link;
  document.getElementById('linkPopup').style.display = 'flex';
}

window.copyLink = function() {
  navigator.clipboard.writeText(document.getElementById('memberLink').value);
  alert('Link copied! Now paste in WhatsApp and send to member');
}

window.closePopup = function() {
  document.getElementById('linkPopup').style.display = 'none';
}

function loadChat(uid, el) {
  currentUid = uid;
  document.querySelectorAll('.user').forEach(u=>u.classList.remove('active'));
  el.classList.add('active');

  document.querySelector('.top b').textContent = uid;
  document.querySelector('.bottom').style.display = 'flex';
  document.getElementById('messages').innerHTML = '';

  onChildAdded(ref(db, 'chats/' + uid), snap => {
    const m = snap.val();
    const div = document.createElement('div');
    div.className = 'msg ' + (m.sender === 'host'? 'me' : 'them');

    if(m.type === 'image') div.innerHTML = `<img src="${m.text}">`;
    else if(m.type === 'voice') div.innerHTML = `<audio controls src="${m.text}"></audio>`;
    else div.textContent = m.text;

    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = 99999;
  });
}

window.sendText = function() {
  const txt = document.getElementById('msgInput').value.trim();
  if(!txt ||!currentUid) return;
  push(ref(db, 'chats/' + currentUid), {text:txt, sender:'host', type:'text', time:Date.now()});
  document.getElementById('msgInput').value = '';
}

window.sendImage = function() {
  document.getElementById('imgInput').click();
}
document.getElementById('imgInput').onchange = e => {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = () => {
    push(ref(db, 'chats/' + currentUid), {text:reader.result, sender:'host', type:'image', time:Date.now()});
  }
  reader.readAsDataURL(file);
}

window.sendVoice = function() {
  document.getElementById('audioInput').click();
}
document.getElementById('audioInput').onchange = e => {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = () => {
    push(ref(db, 'chats/' + currentUid), {text:reader.result, sender:'host', type:'voice', time:Date.now()});
  }
  reader.readAsDataURL(file);
}
</script>
</body>
</html>
