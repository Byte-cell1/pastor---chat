<!DOCTYPE html>
<html>
<head>
<title>Pastor Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#111;color:#fff}
.top{padding:10px;background:#1a1a1a;border-bottom:1px solid #333}
input,button{padding:8px;border-radius:5px;border:none}
input{width:65%;background:#222;color:#fff}
button{background:#25D366;color:#000;cursor:pointer}
#users{height:200px;overflow-y:auto;border-bottom:1px solid #333;padding:10px}
.user{padding:8px;margin:5px 0;background:#222;border-radius:5px;cursor:pointer}
.user.active{background:#25D366;color:#000}
#chat{height:calc(100vh - 300px);overflow-y:auto;padding:10px}
.msg{margin:8px 0;padding:8px 12px;border-radius:10px;max-width:70%}
.me{background:#25D366;color:#000;margin-left:auto;text-align:right}
.them{background:#333}
</style>
</head>
<body>

<div class="top">
  <b>Select a user</b> <span style="color:#25D366;font-size:12px">Pastor Online</span><br>
  <input id="newUser" placeholder="Enter username">
  <button onclick="addUser()">Add</button>
  <div id="userList"></div>
</div>

<div id="users"></div>

<div id="chat">Click a user to start chatting</div>
<input id="msgInput" placeholder="Type reply..." style="width:75%;position:fixed;bottom:0;left:0">
<button onclick="sendMsg()" style="width:20%;position:fixed;bottom:0;right:0">Send</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN", 
  databaseURL: "YOUR_DATABASE_URL",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = null;

// Load users list
onValue(ref(db, 'users'), snap => {
  const usersDiv = document.getElementById('users');
  usersDiv.innerHTML = '';
  snap.forEach(child => {
    const uid = child.key;
    const div = document.createElement('div');
    div.className = 'user' + (uid === currentUser ? ' active' : '');
    div.textContent = uid;
    div.onclick = () => openChat(uid);
    usersDiv.appendChild(div);
  });
});

// Add user function
window.addUser = function() {
  const name = document.getElementById('newUser').value.trim();
  if(!name) return alert('Enter username');
  const uid = name + '_' + Date.now();
  push(ref(db, 'users/' + uid), {text:'User created', sender:'system', time:Date.now()});
  document.getElementById('newUser').value = '';
  alert('Link for ' + name + ':\nhttps://byte-cell1.github.io/pastor---chat/user.html?uid=' + uid);
}

// Open chat with user
function openChat(uid) {
  currentUser = uid;
  document.getElementById('chat').innerHTML = '';
  onChildAdded(ref(db, 'chats/' + uid), snap => {
    const m = snap.val();
    const div = document.createElement('div');
    div.className = 'msg ' + (m.sender === 'pastor' ? 'me' : 'them');
    div.textContent = m.text;
    document.getElementById('chat').appendChild(div);
    document.getElementById('chat').scrollTop = 99999;
  });
}

// Send message
window.sendMsg = function() {
  const txt = document.getElementById('msgInput').value.trim();
  if(!txt || !currentUser) return;
  push(ref(db, 'chats/' + currentUser), {text:txt, sender:'pastor', time:Date.now()});
  document.getElementById('msgInput').value = '';
}
</script>
</body>
</html>
