<!DOCTYPE html>
<html>
<head>
<title>Chat with Pastor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#0b141a;color:#fff;height:100vh;display:flex;flex-direction:column}
.top{padding:12px;background:#1f2c33;border-bottom:1px solid #2a3b44}
#chat{flex:1;overflow-y:auto;padding:10px}
.msg{margin:8px 0;padding:8px 12px;border-radius:8px;max-width:70%;word-wrap:break-word}
.me{background:#005c4b;margin-left:auto;text-align:right}
.them{background:#202c33}
.msg img{max-width:200px;border-radius:8px;margin-top:5px}
.msg audio{max-width:220px}
.bottom{position:fixed;bottom:0;left:0;width:100%;display:flex;background:#1f2c33;padding:5px;gap:4px}
#msgInput{flex:1;padding:10px;border:none;border-radius:20px;background:#2a3b44;color:#fff;outline:none}
.bottom button{border:none;border-radius:50%;width:45px;height:45px;font-size:20px;cursor:pointer;background:#2a3b44;color:#fff}
#micBtn{background:#25D366}
#micBtn.recording{background:red}

</style>
</head>
<body>

<div class="top">
  <b>Chat with Pastor</b>
</div>

<div id="chat">Connecting...</div>

<div class="bottom">
  <input id="msgInput" placeholder="Type message...">
  <button id="micBtn" onclick="toggleRecord()">🎤</button>
  <button onclick="document.getElementById('camInput').click()">📷</button>
  <button onclick="document.getElementById('fileInput').click()">📎</button>
  <button onclick="sendMsg()">➤</button>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none">
<input type="file" id="camInput" accept="image/*" capture="environment" style="display:none">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
    apiKey: "AIzaSyDXeh9GNe3E8L6tE9xMA8fE2OJXCSuhLMY",
  authDomain: "church-project-bfb2d.firebaseapp.com",
  databaseURL: "https://church-project-bfb2d-default-rtdb.firebaseio.com",
  projectId: "church-project-bfb2d",
  storageBucket: "church-project-bfb2d.firebasestorage.app",
  messagingSenderId: "433486920211",
  appId: "1:433486920211:web:5d3516a50741901a1d9de6",
  measurementId: "G-HB5YTLV4VN"

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

const params = new URLSearchParams(window.location.search);
const currentUid = params.get('uid');
let mediaRecorder, audioChunks = [];

// Load chat
onChildAdded(ref(db, 'chats/' + currentUid), snap => {
  const m = snap.val();
  const div = document.createElement('div');
  div.className = 'msg ' + (m.sender === 'user'? 'me' : 'them');

  if(m.type === 'image') div.innerHTML = `<img src="${m.text}">`;
  else if(m.type === 'voice') div.innerHTML = `<audio controls src="${m.text}"></audio>`;
  else div.textContent = m.text;

  document.getElementById('chat').appendChild(div);
  document.getElementById('chat').scrollTop = 99999;
});

// Send text
window.sendMsg = function() {
  const txt = document.getElementById('msgInput').value.trim();
  if(!txt) return;
  push(ref(db, 'chats/' + currentUid), {text:txt, sender:'user', time:Date.now()});
  document.getElementById('msgInput').value = '';
}

// Send photo/gallery
document.getElementById('fileInput').onchange = e => uploadFile(e.target.files[0], 'image');
document.getElementById('camInput').onchange = e => uploadFile(e.target.files[0], 'image');

// Voice note - unique 🎤 button
const micBtn = document.getElementById('micBtn');
window.toggleRecord = async function() {
  if(mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    micBtn.textContent = '🎤';
    micBtn.classList.remove('recording');
    return;
  }

  // First tap asks mic permission. After Allow, records instantly
  const stream = await navigator.mediaDevices.getUserMedia({audio: true});
  mediaRecorder = new MediaRecorder(stream);
  audioChunks = [];

  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
  mediaRecorder.onstop = async () => {
    const blob = new Blob(audioChunks, {type: 'audio/webm'});
    const storageRef = sref(storage, 'voice/' + currentUid + '/' + Date.now() + '.webm');
    const snap = await uploadBytes(storageRef, blob);
    const url = await getDownloadURL(snap.ref);
    push(ref(db, 'chats/' + currentUid), {
      text: url,
      sender: 'user',
      type: 'voice',
      time: Date.now()
    });
    stream.getTracks().forEach(t => t.stop());
  };

  mediaRecorder.start();
  micBtn.textContent = '⏹️';
  micBtn.classList.add('recording');
}

async function uploadFile(file, type) {
  if(!file) return;
  const storageRef = sref(storage, type + 's/' + currentUid + '/' + Date.now());
  const snap = await uploadBytes(storageRef, file);
  const url = await getDownloadURL(snap.ref);
  push(ref(db, 'chats/' + currentUid), {text:url, sender:'user', type:type, time:Date.now()});
}
</script>
</body>
</html>
