<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with Pastor</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Roboto,sans-serif}
body{background:#0b141a;color:#e9edef;height:100vh;display:flex;flex-direction:column}
.header{padding:15px;background:#202c33;text-align:center;border-bottom:1px solid #222f35}
.header h2{font-size:16px;font-weight:600}
.header .status{font-size:12px;color:#8696a0;margin-top:3px}
.chat-body{flex:1;overflow-y:auto;padding:20px}
.msg{margin:8px 0;display:flex}
.msg.me{justify-content:flex-end}
.msg.pastor{justify-content:flex-start}
.bubble{max-width:75%;padding:8px 12px;border-radius:7.5px;font-size:14.5px;line-height:1.4}
.me .bubble{background:#005c4b;border-top-right-radius:0}
.pastor .bubble{background:#202c33;border-top-left-radius:0}
.time{font-size:11px;color:#667781;margin-top:3px;text-align:right}
.chat-input{padding:10px 15px;background:#202c33;display:flex;gap:10px}
.chat-input input{flex:1;padding:12px 15px;border-radius:8px;border:none;background:#2a3942;color:#e9edef;outline:none}
.chat-input button{background:#00a884;border:none;color:#fff;width:45px;height:45px;border-radius:50%;cursor:pointer;font-size:18px}
.removed{text-align:center;margin-top:100px;color:#ff3b3b}
</style>
</head>
<body>
<div class="header">
  <h2>Pastor's Chat</h2>
  <div class="status" id="status">Connecting...</div>
</div>
<div class="chat-body" id="chatBody"></div>
<div class="chat-input">
  <input id="msgInput" placeholder="Type a message...">
  <button onclick="sendMessage()">➤</button>
</div>

<script>
const firebaseConfig = YOUR_FIREBASE_CONFIG;
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get('uid');

if(!userId){
  document.body.innerHTML = '<div class="removed">Invalid link. Ask pastor for your chat link.</div>';
}

let pastorOnline = false;
let userName = 'User';

// Check if user exists
db.ref('users/' + userId).on('value', snap => {
  if(!snap.exists()){
    document.body.innerHTML = '<div class="removed">Your access has been removed by Pastor</div>';
  } else {
    userName = snap.val().name;
    document.querySelector('.header h2').textContent = 'Chat with Pastor';
  }
});

// Check pastor status
db.ref('status/pastor').on('value', snap => {
  pastorOnline = snap.val() === true;
  document.getElementById('status').textContent = pastorOnline ? 'Pastor Online' : 'Bot Assistant';
});

// Load only this user's messages
db.ref('chats/' + userId + '/messages').on('child_added', snap => {
  const m = snap.val();
  const div = document.createElement('div');
  div.className = 'msg ' + (m.sender === 'user' ? 'me' : 'pastor');
  div.innerHTML = `<div class="bubble">${m.text}<div class="time">${formatTime(m.time)}</div></div>`;
  document.getElementById('chatBody').appendChild(div);
  document.getElementById('chatBody').scrollTop = document.getElementById('chatBody').scrollHeight;
});

function sendMessage(){
  const text = document.getElementById('msgInput').value.trim();
  if(!text) return;
  
  db.ref('chats/' + userId + '/messages').push({
    text: text,
    sender: 'user',
    time: Date.now()
  });
  document.getElementById('msgInput').value = '';

  // Bot reply only if pastor offline
  if(!pastorOnline){
    setTimeout(() => {
      const botReplies = [
        "Hello " + userName + "! Pastor is currently offline. I've received your message and will notify him.",
        "Thank you for reaching out. Pastor will respond when he's back online. How can I help?",
        "Bot here 👋 Your message is saved. Pastor will see it soon. God bless you.",
        "I'm the assistant bot. Pastor is away right now, but I won't forget your message."
      ];
      const reply = botReplies[Math.floor(Math.random() * botReplies.length)];
      db.ref('chats/' + userId + '/messages').push({
        text: reply,
        sender: 'pastor',
        time: Date.now()
      });
    }, 1200);
  }
}

function formatTime(ts){
  const d = new Date(ts);
  return d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
}

document.getElementById('msgInput').addEventListener('keypress', e => {
  if(e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
